<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SJL Kilpailusäännöt 2025–2026</title>
<style>
  :root {
    --ice: #e8f3fb;
    --ice-mid: #b0cce8;
    --blue-dark: #011D41;
    --blue-mid: #002E6D;
    --blue: #002E6D;
    --blue-light: #00ACD7;
    --gold: #D4A843;
    --gold-light: #f0a500;
    --text: #011D41;
    --text-muted: #3a5070;
    --bg: #CFCFCD;
    --card: #ffffff;
    --border: #b8cce0;
    --nav-w: 300px;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: var(--blue-dark);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .header-logo {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    color: #fff;
    letter-spacing: -0.02em;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo img {
    height: 38px;
    width: auto;
  }
  .header-logo span { color: #fff; }
  .header-logo-img {
    height: 36px;
    width: auto;
    margin-right: 8px;
    border-radius: 2px;
  }
  .header-season {
    font-size: 0.65rem;
    color: var(--ice-mid);
    font-weight: 300;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #menu-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  #menu-toggle span {
    display: block;
    width: 22px; height: 2px;
    background: #fff;
    border-radius: 2px;
    transition: all 0.25s;
  }
  #menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  #menu-toggle.open span:nth-child(2) { opacity: 0; }
  #menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  #search-toggle, #home-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: #fff;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    opacity: 0.85;
    transition: opacity 0.15s;
  }
  #search-toggle:hover, #home-toggle:hover {
    opacity: 1;
  }

  /* ─── OVERLAY ─── */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 150;
  }
  #overlay.active { display: block; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    position: fixed;
    top: 0; left: 0;
    width: var(--nav-w);
    height: 100%;
    background: var(--blue-dark);
    z-index: 200;
    transform: translateX(-100%);
    transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    overflow-y: auto;
    padding-bottom: 40px;
    display: flex;
    flex-direction: column;
  }
  #sidebar.open { transform: translateX(0); }

  .sidebar-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    background: var(--blue-dark);
    z-index: 1;
  }
  .sidebar-title {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sidebar-sub {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.05em;
  }

  .nav-section {
    margin-top: 4px;
  }
  .nav-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px 8px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .nav-section-header:hover { background: rgba(255,255,255,0.04); }
  .nav-section-num {
    font-family: Arial, sans-serif;
    font-size: 0.6rem;
    font-weight: 700;
    color: var(--blue-light);
    background: rgba(30,77,140,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .nav-section-title {
    font-family: Arial, sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    flex: 1;
  }
  .nav-section-chevron {
    color: rgba(255,255,255,0.3);
    font-size: 0.65rem;
    transition: transform 0.2s;
  }
  .nav-section.expanded .nav-section-chevron { transform: rotate(180deg); }

  .nav-rules {
    display: none;
    padding: 0 0 6px 0;
  }
  .nav-section.expanded .nav-rules { display: block; }

  .nav-rule {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px 8px 32px;
    cursor: pointer;
    transition: background 0.12s;
    border-left: 3px solid transparent;
  }
  .nav-rule:hover { background: rgba(255,255,255,0.05); }
  .nav-rule.active {
    background: rgba(30,77,140,0.3);
    border-left-color: var(--blue-light);
  }
  .nav-rule-num {
    font-family: Arial, sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--gold);
    min-width: 24px;
    opacity: 0.8;
  }
  .nav-rule-title {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    line-height: 1.3;
  }
  .nav-rule.active .nav-rule-title { color: #fff; }

  /* ─── MAIN CONTENT ─── */
  #main {
    margin-top: var(--header-h);
    min-height: calc(100vh - var(--header-h));
    padding: 0;
  }

  /* ─── HOME VIEW ─── */
  #home-view {
    padding: 28px 16px 40px;
  }
  .home-hero {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    border-radius: 16px;
    padding: 28px 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .home-hero::before {
    display: none;
  }
  .home-hero-logo {
    display: block;
    width: 80px;
    height: auto;
    margin: 0 auto 16px auto;
  }
  .home-hero-title {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 6px;
    text-align: center;
  }
  .home-hero-sub {
    font-size: 0.8rem;
    color: var(--ice-mid);
    opacity: 0.8;
    text-align: center;
  }
  .home-stats {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .home-stat {
    background: rgba(255,255,255,0.07);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    flex: 1;
  }
  .home-stat-num {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: var(--gold);
    line-height: 1;
  }
  .home-stat-label {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  /* Home search - inside hero */
  .home-search-wrapper-hero {
    position: relative;
    margin-top: 20px;
  }
  .home-search-wrapper-hero #home-search {
    width: 100%;
    padding: 14px 44px 14px 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    font-size: 0.9rem;
    font-family: Arial, sans-serif;
    background: rgba(255,255,255,0.1);
    color: #fff;
    outline: none;
    transition: all 0.15s;
  }
  .home-search-wrapper-hero #home-search::placeholder {
    color: rgba(255,255,255,0.6);
  }
  .home-search-wrapper-hero #home-search:focus { 
    border-color: var(--blue-light); 
    background: rgba(255,255,255,0.15);
  }
  .home-search-wrapper-hero #home-search-clear {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.7);
    display: none;
  }

  .home-sections {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .home-section-drag {
    font-size: 1.4rem;
    color: var(--text-muted);
    cursor: grab;
    padding: 8px 4px 8px 12px;
    flex-shrink: 0;
    user-select: none;
    touch-action: none;
    display: flex;
    align-items: center;
  }
  .home-section-card.dragging-source {
    opacity: 0.15 !important;
    transform: none !important;
    pointer-events: none;
  }
  .drag-ghost {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.22), 0 2px 8px rgba(0,0,0,0.10);
    border-radius: 12px;
    opacity: 0.95;
    transition: none;
    will-change: top;
  }
  .drop-indicator {
    height: 3px;
    background: var(--blue-light);
    border-radius: 2px;
    margin: -2px 0;
    transition: opacity 0.12s;
    position: relative;
    z-index: 10;
    box-shadow: 0 0 8px rgba(0,172,215,0.5);
  }
  .home-section-card {
    background: var(--card);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(10,22,40,0.06);
  }
  .home-section-card:hover {
    border-color: var(--blue-light);
    box-shadow: 0 2px 12px rgba(30,77,140,0.12);
    transform: translateY(-1px);
  }
  .home-section-icon {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 1rem;
    color: #fff;
  }
  .home-section-info { flex: 1; }
  .home-section-name {
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--text);
    margin-bottom: 2px;
  }
  .home-section-meta {
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .home-section-arrow {
    color: var(--border);
    font-size: 0.9rem;
  }

  /* ─── FAVORITES ─── */
  .fav-section { margin-bottom: 20px; display: none; }
  .fav-section.has-items { display: block; }
  .fav-section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.78rem; font-weight: 700; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px; padding: 0 2px;
  }
  .fav-star-btn {
    background: none; border: none; cursor: pointer;
    padding: 4px 6px; display: flex; align-items: center;
    flex-shrink: 0; transition: transform 0.15s;
  }
  .fav-star-btn:hover { transform: scale(1.2); }
  .fav-star-btn svg { width: 18px; height: 18px; }
  .fav-star-btn .star-outline { color: #b8cce0; }
  .fav-star-btn .star-filled { color: #D4A843; display: none; }
  .fav-star-btn.active .star-outline { display: none; }
  .fav-star-btn.active .star-filled { display: block; }

  /* ─── RESET ORDER ─── */
  .reset-order-wrapper {
    text-align: center;
    padding: 16px 0 24px;
  }
  .reset-order-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,46,109,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-order-btn:hover {
    background: rgba(0,46,109,0.12);
    border-color: var(--blue-light);
    color: var(--blue);
  }
  .reset-order-btn svg {
    color: inherit;
  }

  /* ─── SECTION VIEW ─── */
  #section-view {
    display: none;
  }
  .section-header-bar {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    padding: 20px 16px 24px;
    position: relative;
  }
  .section-breadcrumb {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 10px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    font-weight: 600;
    transition: background 0.15s, color 0.15s;
  }
  .section-breadcrumb:hover { color: #fff; background: rgba(255,255,255,0.13); }
  .section-num-badge {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 0.7rem;
    color: var(--gold);
    background: rgba(212,168,67,0.15);
    border: 1px solid rgba(212,168,67,0.3);
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.06em;
    display: inline-block;
    margin-bottom: 8px;
  }
  .section-title-main {
    font-family: Arial, sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    color: #fff;
    line-height: 1.2;
  }
  .section-nav {
    display: flex;
    gap: 8px;
    margin-top: 14px;
  }
  .section-nav-btn {
    flex: 1;
    padding: 8px 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 0.72rem;
    cursor: pointer;
    font-family: Arial, sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.15s;
    max-width: 50%;
  }
  .section-nav-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .section-nav-btn:disabled { opacity: 0.3; cursor: default; }

  .section-body {
    padding: 16px 16px 40px;
  }

  .rule-card {
    background: var(--card);
    border-radius: 12px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(10,22,40,0.05);
  }
  .rule-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 15px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .rule-header:hover { background: #f8fbff; }
  .rule-id {
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    color: var(--blue-light);
    min-width: 36px;
  }
  .rule-title {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    line-height: 1.3;
  }
  .rule-chevron {
    color: var(--text-muted);
    font-size: 0.65rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .rule-card.expanded .rule-chevron { transform: rotate(180deg); }
  .rule-content {
    display: none;
    padding: 0 15px 14px 15px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 12px;
    white-space: pre-wrap;
  }
  .rule-card.expanded .rule-content { display: block; }

  /* ─── SEARCH VIEW ─── */
  #search-view {
    display: none;
    padding: 16px 16px 40px;
  }
  .search-box-wrapper {
    position: relative;
    margin-bottom: 16px;
  }
  #search-input {
    width: 100%;
    padding: 14px 44px 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 0.9rem;
    font-family: Arial, sans-serif;
    background: var(--card);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--blue-light); }
  .search-icon-btn {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text-muted);
  }
  .search-results-info {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .search-result-item {
    background: var(--card);
    border-radius: 10px;
    padding: 13px 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    box-shadow: 0 1px 3px rgba(10,22,40,0.04);
  }
  .search-result-item:hover {
    border-color: var(--blue-light);
    box-shadow: 0 2px 10px rgba(30,77,140,0.1);
  }
  .search-result-rule {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 5px;
  }
  .search-result-badge {
    font-family: Arial, sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    color: var(--blue-light);
    background: rgba(30,77,140,0.08);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .search-result-title {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
  }
  .search-result-snippet {
    font-size: 0.76rem;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 4px;
  }
  .search-highlight { background: rgba(212,168,67,0.35); border-radius: 2px; padding: 0 2px; }
  .search-empty {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
    font-size: 0.85rem;
  }
  .search-empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  /* ─── RESPONSIVE DESKTOP ─── */
  @media (min-width: 768px) {
    #menu-toggle { display: none; }
    #sidebar {
      transform: translateX(0) !important;
    }
    #main {
      margin-left: var(--nav-w);
    }
    #overlay { display: none !important; }
    .section-header-bar { padding: 28px 32px 32px; }
    .section-body { padding: 24px 32px 60px; }
    #home-view { padding: 32px; }
    #search-view { padding: 24px 32px 60px; }
    .home-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  }

  /* ─── SCROLLBAR ─── */
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

  /* ─── TRANSITIONS ─── */
  #home-view, #section-view, #search-view {
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <button id="menu-toggle" aria-label="Valikko">
    <span></span><span></span><span></span>

// DRAG & DROP
// ═══════════════════════════════════════════════════════════════════════════

function initSectionDrag() {
  const listEl = document.getElementById('home-sections');
  const cardSel = '.home-section-card';
  const handleSel = '.home-section-drag';
  
  let srcCard = null, ghost = null, indicator = null, srcIdx = -1, curIdx = -1;
  let ghostOffY = 0;

  function getCards() { return [...listEl.querySelectorAll(cardSel + ':not(.drop-indicator)')]; }

  function createGhost(card, y) {
    const r = card.getBoundingClientRect();
    ghostOffY = y - r.top;
    ghost = card.cloneNode(true);
    ghost.className = 'drag-ghost';
    ghost.style.width = r.width + 'px';
    ghost.style.left = r.left + 'px';
    ghost.style.top = (y - ghostOffY) + 'px';
    document.body.appendChild(ghost);
  }

  function moveGhost(y) {
    if (!ghost) return;
    ghost.style.top = (y - ghostOffY) + 'px';
  }

  function removeGhost() {
    if (ghost) { ghost.remove(); ghost = null; }
  }

  function removeIndicator() {
    if (indicator) { indicator.remove(); indicator = null; }
  }

  function showIndicator(cards, y) {
    removeIndicator();
    let insertIdx = cards.length;
    for (let i = 0; i < cards.length; i++) {
      const rect = cards[i].getBoundingClientRect();
      if (y < rect.top + rect.height / 2) { insertIdx = i; break; }
    }
    if (insertIdx === srcIdx || insertIdx === srcIdx + 1) { curIdx = -1; return; }
    curIdx = insertIdx;
    indicator = document.createElement('div');
    indicator.className = 'drop-indicator';
    if (insertIdx < cards.length) {
      listEl.insertBefore(indicator, cards[insertIdx]);
    } else {
      listEl.appendChild(indicator);
    }
  }

  function finishDrag() {
    if (srcCard) srcCard.classList.remove('dragging-source');
    removeGhost();
    removeIndicator();
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
    if (srcIdx >= 0 && curIdx >= 0 && curIdx !== srcIdx && curIdx !== srcIdx + 1) {
      const toIdx = curIdx > srcIdx ? curIdx - 1 : curIdx;
      // Reorder
      sectionOrder.splice(toIdx, 0, sectionOrder.splice(srcIdx, 1)[0]);
      localStorage.setItem('sjl_ks_section_order', JSON.stringify(sectionOrder));
      buildHome();
    }
    srcCard = null; srcIdx = -1; curIdx = -1;
  }

  function startDrag(card, y) {
    srcCard = card;
    srcIdx = getCards().indexOf(card);
    card.classList.add('dragging-source');
    createGhost(card, y);
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  }

  // Mouse events
  listEl.addEventListener('mousedown', e => {
    const handle = e.target.closest(handleSel);
    if (!handle) return;
    const card = handle.closest(cardSel);
    if (!card || !listEl.contains(card)) return;
    e.preventDefault();
    startDrag(card, e.clientY);
    const onMove = ev => { ev.preventDefault(); moveGhost(ev.clientY); showIndicator(getCards(), ev.clientY); };
    const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); finishDrag(); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // Touch events
  listEl.addEventListener('touchstart', e => {
    const handle = e.target.closest(handleSel);
    if (!handle) return;
    const card = handle.closest(cardSel);
    if (!card || !listEl.contains(card)) return;
    const t0 = e.touches[0];
    let moved = false;
    const onMove = ev => {
      const t = ev.touches[0];
      if (!moved) {
        if (Math.abs(t.clientY - t0.clientY) < 5) return;
        moved = true;
        ev.preventDefault();
        startDrag(card, t.clientY);
      } else {
        ev.preventDefault();
      }
      moveGhost(t.clientY);
      showIndicator(getCards(), t.clientY);
    };
    const onEnd = () => {
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('touchend', onEnd);
      document.removeEventListener('touchcancel', onEnd);
      if (moved) finishDrag();
      else { srcCard = null; srcIdx = -1; }
    };
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
    document.addEventListener('touchcancel', onEnd);
  }, { passive: true });
}

function toggleFavorite(favId, ev) {
  if (ev) { ev.stopPropagation(); ev.preventDefault(); }

  if (idx >= 0) {
    favorites.splice(idx, 1);
  } else {
    favorites.push(favId);
  }
  localStorage.setItem('sjl_ks_favorites', JSON.stringify(favorites));
  renderFavorites();

  document.querySelectorAll('.fav-star-btn').forEach(btn => {
    btn.classList.toggle('active', favorites.includes(btn.dataset?.fav));
  });
}

function favStarHTML(favId) {
  const isActive = favorites.includes(favId);

function openSection(sectionId, scrollToRuleId = null) {
  currentSectionId = sectionId;
  const section = DB.sections.find(s => s.id === sectionId);
  if (!section) return;
  
  // Update header
  document.getElementById('section-badge').textContent = 'OSA ' + section.id;
  document.getElementById('section-title').textContent = section.title;
  
  // Prev/Next buttons
  const idx = DB.sections.findIndex(s => s.id === sectionId);
  const prevBtn = document.getElementById('prev-section-btn');
  const nextBtn = document.getElementById('next-section-btn');
  
  if (idx > 0) {
    const prev = DB.sections[idx - 1];
    prevBtn.disabled = false;
    prevBtn.onclick = () => openSection(prev.id);
    prevBtn.textContent = '← ' + prev.title.substring(0, 20) + (prev.title.length > 20 ? '…' : '');
  } else {
    prevBtn.disabled = true;
    prevBtn.textContent = '← Edellinen';
  }
  
  if (idx < DB.sections.length - 1) {
    const next = DB.sections[idx + 1];
    nextBtn.disabled = false;
    nextBtn.onclick = () => openSection(next.id);
    nextBtn.textContent = next.title.substring(0, 20) + (next.title.length > 20 ? '…' : '') + ' →';
  } else {
    nextBtn.disabled = true;
    nextBtn.textContent = 'Seuraava →';
  }
  
  // Build rules
  let html = '';
  if (section.intro) {
    html += `<p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:16px;line-height:1.6;">${escHtml(section.intro)}</p>`;
  }
  
  section.rules.forEach(rule => {
    const favId = section.id + ':' + rule.id;
    html += `
      <div class="rule-card" id="rule-${rule.id.replace('.','_')}">
        <div class="rule-header" onclick="toggleRule('${rule.id.replace('.','_')}')">
          <span class="rule-id">${rule.id}</span>
          <span class="rule-title">${rule.title}</span>
          ${favStarHTML(favId)}
          <span class="rule-chevron">▼</span>
        </div>
        <div class="rule-content">${escHtml(rule.content)}</div>
      </div>
    `;
  });
  
  document.getElementById('section-body').innerHTML = html;
  
  // Update nav
  document.querySelectorAll('.nav-rule.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-section').forEach(el => el.classList.remove('expanded'));
  const navSection = document.getElementById('nav-section-' + sectionId);
  if (navSection) navSection.classList.add('expanded');
  
  // Show view
  setView('section');
  window.scrollTo(0, 0);
  
  // Close sidebar on mobile
  if (window.innerWidth < 768) closeSidebar();
  
  // Scroll to specific rule if requested
  if (scrollToRuleId) {
    setTimeout(() => {
      const ruleEl = document.getElementById('rule-' + scrollToRuleId.replace('.','_'));
      if (ruleEl) {
        ruleEl.classList.add('expanded');
        ruleEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }, 100);
  }
}

function toggleRule(id) {
  const el = document.getElementById('rule-' + id);
  if (el) el.classList.toggle('expanded');
}

// SEARCH

function showSearch() {
  setView('search');
  setTimeout(() => document.getElementById('search-input').focus(), 100);
}

function performSearch(query) {
  const results = document.getElementById('search-results');
  const info = document.getElementById('search-info');
  
  if (!query || query.length < 2) {
    results.innerHTML = '<div class="search-empty"><div class="search-empty-icon">🔍</div>Kirjoita hakusana (vähintään 2 merkkiä)</div>';
    info.textContent = '';
    return;
  }
  
  const q = query.toLowerCase().trim();
  const matches = [];
  
  DB.sections.forEach(section => {
    section.rules.forEach(rule => {
      let score = 0;
      let snippet = '';
      
      // ID match
      if (rule.id.toLowerCase() === q || rule.id.toLowerCase().startsWith(q)) {
        score += 100;
      }
      
      // Title match
      if (rule.title.toLowerCase().includes(q)) {
        score += 50;
        snippet = rule.title;
      }
      
      // Content match
      if (rule.content.toLowerCase().includes(q)) {
        score += 20;
        if (!snippet) {
          const idx = rule.content.toLowerCase().indexOf(q);
          snippet = '...' + rule.content.substring(Math.max(0, idx - 40), idx + 100) + '...';
        }
      }
      
      if (score > 0) {
        matches.push({ section, rule, score, snippet });
      }
    });
  });
  
  matches.sort((a, b) => b.score - a.score);
  const shown = matches.slice(0, 30);
  
  info.textContent = `${matches.length} tulosta haulle "${query}"`;
  
  if (shown.length === 0) {
    results.innerHTML = '<div class="search-empty"><div class="search-empty-icon">😕</div>Ei tuloksia. Kokeile eri hakusanaa.</div>';
    return;
  }
  
  let html = '';
  shown.forEach(m => {
    const snip = highlightText(m.snippet, q);
    html += `
      <div class="search-result-item" onclick="openSection('${m.section.id}', '${m.rule.id}')">
        <div class="search-result-rule">
          <span class="search-result-badge">${m.rule.id}</span>
          <span class="search-result-title">${highlightText(m.rule.title, q)}</span>
        </div>
        ${snip ? `<div class="search-result-snippet">${snip}</div>` : ''}
      </div>
    `;
  });
  
  results.innerHTML = html;
}

function highlightText(text, query) {
  if (!text || !query) return escHtml(text || '');
  const escaped = escHtml(text);
  const q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(q, 'gi'), m => `<mark class="search-highlight">${m}</mark>`);
}

// Home search
let homeSearchTimeout = null;

function doHomeSearch(val) {
  const clearBtn = document.getElementById('home-search-clear');
  clearBtn.style.display = val ? 'block' : 'none';
  
  clearTimeout(homeSearchTimeout);
  homeSearchTimeout = setTimeout(() => performHomeSearch(val), 180);
}

function clearHomeSearch() {
  const input = document.getElementById('home-search');
  input.value = '';
  input.focus();
  document.getElementById('home-search-clear').style.display = 'none';
  document.getElementById('home-search-panel').style.display = 'none';
  document.getElementById('home-sections').style.display = '';
  if (favorites.length > 0) {
    document.getElementById('fav-section').style.display = 'block';
  }
}

function performHomeSearch(query) {
  const panel = document.getElementById('home-search-panel');
  const sections = document.getElementById('home-sections');
  const favSection = document.getElementById('fav-section');
  
  if (!query || query.length < 2) {
    panel.style.display = 'none';
    sections.style.display = '';
    if (favorites.length > 0) favSection.style.display = 'block';
    return;
  }
  
  sections.style.display = 'none';
  favSection.style.display = 'none';
  panel.style.display = 'block';
  
  const q = query.toLowerCase().trim();
  const matches = [];
  
  DB.sections.forEach(section => {
    section.rules.forEach(rule => {
      let score = 0;
      let snippet = '';
      
      // ID match
      if (rule.id.toLowerCase() === q || rule.id.toLowerCase().startsWith(q)) {
        score += 100;
      }
      
      // Title match
      if (rule.title.toLowerCase().includes(q)) {
        score += 50;
        snippet = rule.title;
      }
      
      // Content match
      if (rule.content.toLowerCase().includes(q)) {
        score += 20;
        if (!snippet) {
          const idx = rule.content.toLowerCase().indexOf(q);
          snippet = '...' + rule.content.substring(Math.max(0, idx - 40), idx + 100) + '...';
        }
      }
      
      if (score > 0) {
        matches.push({ section, rule, score, snippet });
      }
    });
  });
  
  matches.sort((a, b) => b.score - a.score);
  const shown = matches.slice(0, 30);
  
  if (shown.length === 0) {
    panel.innerHTML = '<div class="search-empty"><div class="search-empty-icon">😕</div>Ei tuloksia. Kokeile eri hakusanaa.</div>';
    return;
  }
  
  let html = `<div class="search-results-info">${matches.length} tulosta haulle "${escHtml(query)}"</div>`;
  shown.forEach(m => {
    const snip = highlightText(m.snippet, q);
    html += `
      <div class="search-result-item" onclick="openSection('${m.section.id}', '${m.rule.id}')">
        <div class="search-result-rule">
          <span class="search-result-badge">${m.rule.id}</span>
          <span class="search-result-title">${highlightText(m.rule.title, q)}</span>
        </div>
        ${snip ? `<div class="search-result-snippet">${snip}</div>` : ''}
      </div>
    `;
  });
  
  panel.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════════════
// VIEW MANAGEMENT
// ═══════════════════════════════════════════════════════════════════════════

function setView(view) {
  currentView = view;
  document.getElementById('home-view').style.display = view === 'home' ? 'block' : 'none';
  document.getElementById('section-view').style.display = view === 'section' ? 'block' : 'none';
  document.getElementById('search-view').style.display = view === 'search' ? 'block' : 'none';
}

function showHome() {
  setView('home');
  window.scrollTo(0, 0);
  clearHomeSearch();
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
